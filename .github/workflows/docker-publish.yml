name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          config-inline: |
            [registry."registry-taloslab.subetupaginacp.com"]
              http = true
              insecure = true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry-taloslab.subetupaginacp.com
          username: admin
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Log in to ghcr.io for base image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: palbina
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: registry-taloslab.subetupaginacp.com/palbina/openclaw-custom:latest
